name: ForgeEngine CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Setup Third Party Libraries
        run: |
          mkdir -p third_party
          git clone --depth 1 --branch docking https://github.com/ocornut/imgui.git third_party/imgui
          git clone --depth 1 https://github.com/memononen/nanosvg.git third_party/nanosvg_repo
          mkdir -p third_party/nanosvg
          cp third_party/nanosvg_repo/src/nanosvg.h third_party/nanosvg/
          cp third_party/nanosvg_repo/src/nanosvgrast.h third_party/nanosvg/
          mkdir -p third_party/stb
          curl -L -o third_party/stb/stb_image.h https://raw.githubusercontent.com/nothings/stb/master/stb_image.h
          cp -r ${ANDROID_HOME}/ndk/26.1.10909125/sources/android/native_app_glue third_party/android_native_app_glue

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeEngine-Debug
          path: android/build/outputs/apk/debug/*.apk
